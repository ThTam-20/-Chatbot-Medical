<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Medical Chatbot</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		<!-- jQuery chỉ load 1 lần -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
	</head>
	
	<body>
		<div class="container-fluid h-100">
			<div class="row justify-content-center h-100">		
				<div class="col-md-10 col-xl-10 chat">
					<div class="card">
						<div class="card-header msg_head">
							<div class="d-flex bd-highlight">
								<div class="img_cont">
									<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img" alt="Bot avatar">
									<span class="online_icon"></span>
								</div>
								<div class="user_info">
									<span>Medical Chatbot</span>
									<p>Ask me anything!</p>
								</div>
							</div>
						</div>
						<div id="messageFormeight" class="card-body msg_card_body">
							
							
						</div>
						<div class="card-footer">
							<form id="messageArea" class="input-group">
                                <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
								<div class="input-group-append">
									<button type="submit" id="send" class="input-group-text send_btn"><i class="fas fa-location-arrow"></i></button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<script>
			$(document).ready(function() {
				$("#messageArea").on("submit", function(event) {
					event.preventDefault();
					
					const date = new Date();
					const hour = date.getHours();
					const minute = date.getMinutes().toString().padStart(2, '0');
					const str_time = hour + ":" + minute;
					var rawText = $("#text").val().trim();

					if (!rawText) return;

					// Hiển thị tin nhắn người dùng — dùng .text() để tránh XSS
					var $userMsg = $('<div class="d-flex justify-content-end mb-4"></div>');
					var $userContainer = $('<div class="msg_cotainer_send"></div>');
					$userContainer.text(rawText);
					$userContainer.append('<span class="msg_time_send">' + str_time + '</span>');
					var $userAvatar = $('<div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg" alt="User avatar"></div>');
					$userMsg.append($userContainer).append($userAvatar);
					
					$("#text").val("");
					$("#messageFormeight").append($userMsg);

					$.ajax({
						data: {
							msg: rawText,	
						},
						type: "POST",
						url: "/get",
					}).done(function(data) {
						// Hiển thị tin nhắn bot — dùng .text() để tránh XSS
						var $botMsg = $('<div class="d-flex justify-content-start mb-4"></div>');
						var $botAvatar = $('<div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg" alt="Bot avatar"></div>');
						var $botContainer = $('<div class="msg_cotainer"></div>');
						$botContainer.text(data);
						$botContainer.append('<span class="msg_time">' + str_time + '</span>');
						$botMsg.append($botAvatar).append($botContainer);
						$("#messageFormeight").append($botMsg);

						// Tự động cuộn xuống
						$("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
					}).fail(function() {
						var $errMsg = $('<div class="d-flex justify-content-start mb-4"></div>');
						var $errContainer = $('<div class="msg_cotainer" style="color:red;"></div>');
						$errContainer.text("Lỗi kết nối. Vui lòng thử lại.");
						$errMsg.append($errContainer);
						$("#messageFormeight").append($errMsg);
					});
				});
			});
		</script>
        
    </body>
</html>
